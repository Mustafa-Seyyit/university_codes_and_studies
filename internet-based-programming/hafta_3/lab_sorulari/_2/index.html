<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multimedya Tablosu</title>
    <style>
      table,
      th,
      td {
        border: 1px solid black;
        border-collapse: collapse;
        padding: 8px;
      }
      th {
        background-color: lightgray;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th>Tür</th>
        <th>İçerik</th>
      </tr>
      <tr>
        <td>Video</td>
        <td><video src="video.mp4" controls 400px></video></td>
      </tr>
      <tr>
        <td>Ses</td>
        <td><audio src="song1.mp3" controls></audio></td>
      </tr>
    </table>
  </body>
</html>
