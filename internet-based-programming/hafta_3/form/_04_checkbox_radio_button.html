<!doctype html>
<html>
  <head></head>
  <body>
    <form>
      <label for="html">
        <input
          type="checkbox"
          name="languages"
          id="html"
          value="html"
          checked
        />
        HTML
      </label>

      <label for="css">
        <input type="checkbox" name="languages" id="css" value="css" /> CSS
      </label>

      <label for="javascript">
        <input
          type="checkbox"
          name="languages"
          id="javascript"
          value="javascript"
          disabled
        />
        Java Script
      </label>
    </form>

    <h2>Product Size</h2>
    <form>
      <label for="small">
        <input type="radio" name="size" id="small" value="small" /> Small
      </label>
      <label for="medium">
        <input type="radio" name="size" id="medium" value="medium" checked />
        Medium
      </label>
      <label for="large">
        <input type="radio" name="size" id="large" value="large" /> Large
      </label>
    </form>
  </body>
</html>
