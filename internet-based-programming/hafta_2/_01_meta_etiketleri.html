<!--meta etiketleri sayfada gözükmeyen ama tarayıcıya lazım olan meta etiketlerini bulundurur.-->

<!DOCTYPE html>
<>
    <head>

        <meta name="viewport" content="width = device-width, initial-scale = 1.0" />
        <!--tarayıcıya mobil cihazlarda sayfanın nasıl oluşucağını bildiren etiketdir.-->

        
        <meta name ="description" content="sayfanın geniş açıklamasını yazıyoruz bu kısma" />
        <!--tarayıcı arama sonuçlarını gösterdiği görüntüde bizim web sayfamızın başlığının altında yazan
        küçük yazıda yazılan bilgiler bölümü etiketidir.-->


        <meta name="abstract" content="sayfanın kısa özeti" />
        <!--bu etiket artık neredeyse kullanılmamaktadır, yerine description tercih edilir.-->


        <meta name="author", content="mustafa, mustafaseyyitdogan@gmail.com" />
        <!--sayfa yazarının ismi, iletişim bilgileri gibi bilgilerinin yazıldığı etiketdir.-->


        <meta name="Copyright" content="telif hakkında bilgilendirme cümlesi" />
        <!--telif hakları artık kullanılmıyor altta verdiğim footer yapısı kullanılıyor-->

        <footer>
            © 2027 tüm hakları saklıdır
        </footer>


        <meta htttp-equiv ="Content-Type" content="text/html; charset=UTF-8" />
        <!-- charset: tarayıcının kullanılan karakterleri tanıması için tanımlana karakter setidir-->


        <meta name="Expires" content="Wed, 10 Apr 2026 12:00:00 GMT">
        <!--Modern tarayıcılar genelde HTTP header’daki cache ayarını dikkate alır, meta’yı değil-->

        <meta name="keywords" content="kelime1, kelime2, kelime3, kelime4, kelime5, kelime6, ..." />
        <!--arama motorolarının temel aldığı sitenin içeriğinin kelime kelime özeti yani anahtar kelimelerinin 
        bulundurulduğu etiketdir.-->


        <meta name="revisit-after" content="7 days">
        <!-- sitenin içeriğinin kaç günde bir güncellendiğini 
         ileten etiket. Eskiden bazı arama motorları için önerilirdi.-->


        <meta http-equiv="content-language" content="tr">
        <!--sayfanın dilini belirtir artık kullanılmaz-->
        

        <html lang="tr"></html>
        <!--güncel dil belirtimi-->


        <meta http-equiv="refresh" content="60" />
        <!--sayfanın yenilenme süresini verir bu örnekde 60sn-->


        <meta http-equiv="refresh" content="2", url="www.google.com" />
        <!--belli bir saniye sonra başka bir sayfaya yönlendirme yapar.-->


        <meta name="robots" content="none">

        <meta name="robots" content="index,follow">

        <meta name="robots" content="noindex,follow">

        <meta name="robots" content="index,nofollow">

        <meta name="robots" content="noindex,nofollow">
        <!--Index: Arama motorlarına “bu sayfayı dizinine ekle ve sonuçlarda göster” demektir.
        Noindex: Arama motorlarına “bu sayfayı dizinine ekleme, arama sonuçlarında gösterme” demektir.
        Follow: Arama motorlarına “bu sayfadaki linkleri takip et ve onları da incele” demektir.
        Nofollow: Arama motorlarına “bu sayfadaki linkleri takip etmene gerek yok” şeklinde bir ipucu verir (ama tamamen zorunlu değildir).-->

        


    </head>
</html>
